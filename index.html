<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Investment Log</title>
  <meta name="description" content="딥러닝 투자 로그 단일 대시보드">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Investment Log">
  <meta property="og:title" content="Investment Log">
  <meta property="og:description" content="날짜별 딥러닝 매매 제안을 한 화면에서 확인하는 투자 로그">
  <meta property="og:url" content="https://the198thstreet.github.io/investmentLog/">
  <meta property="og:image" content="https://the198thstreet.github.io/investmentLog/icon.png">
  <meta property="og:image:alt" content="Investment Log 대표 이미지">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Investment Log">
  <meta name="twitter:description" content="날짜별 딥러닝 매매 제안을 한 화면에서 확인하는 투자 로그">
  <meta name="twitter:image" content="https://the198thstreet.github.io/investmentLog/icon.png">
  <meta name="theme-color" content="#153c68">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
</head>
<body data-page="home">
  <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
  <div class="site-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="Investment Log 홈">
          <span class="brand-mark">IL</span>
          <span>
            <strong>Investment Log</strong>
            <small>딥러닝 매매 제안 로그</small>
          </span>
        </a>
        <div class="header-status">
          <span class="status-chip" id="updated-at-chip">데이터 확인 중</span>
        </div>
      </div>
    </header>

    <main id="main-content" class="site-main">
      <section class="hero-section">
        <div class="container">
          <section class="hero-bar panel reveal">
            <div class="hero-bar-copy">
            <p class="eyebrow" id="hero-eyebrow">종목</p>
              <h1 id="hero-title">날짜별 투자 로그를 불러오는 중입니다.</h1>
              <p class="section-copy" id="hero-summary">최근 거래일 데이터와 상위 종목 요약을 준비하고 있습니다.</p>
            </div>
            <div class="hero-mini-grid">
              <article class="hero-mini-card hero-mini-buy">
                <span class="metric-label">매수</span>
                <strong class="metric-value" id="buy-count">-</strong>
              </article>
              <article class="hero-mini-card hero-mini-hold">
                <span class="metric-label">보유</span>
                <strong class="metric-value" id="hold-count">-</strong>
              </article>
              <article class="hero-mini-card hero-mini-sell">
                <span class="metric-label">매도</span>
                <strong class="metric-value" id="sell-count">-</strong>
              </article>
              <article class="hero-mini-card hero-mini-total">
                <span class="metric-label">표 표시 수</span>
                <strong class="metric-value" id="total-count">-</strong>
              </article>
            </div>
          </section>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <section class="panel table-panel reveal">
            <div class="table-heading-bar">
              <div class="section-heading section-heading-spread">
                <div>
                  <p class="eyebrow" id="table-eyebrow">종목</p>
                  <h2 id="table-title">종목 요약 표</h2>
                </div>
              </div>
              <div class="date-toolbar-wrap" id="date-toolbar-wrap">
                <div class="date-toolbar">
                  <button class="nav-arrow" type="button" id="prev-date" aria-label="이전 날짜">
                    <span aria-hidden="true">‹</span>
                  </button>
                  <label class="date-picker">
                    <span class="sr-only">조회 날짜</span>
                    <input id="report-date-picker" type="date">
                  </label>
                  <button class="nav-arrow" type="button" id="next-date" aria-label="다음 날짜">
                    <span aria-hidden="true">›</span>
                  </button>
                </div>
              </div>
            </div>

            <div class="surface-banner" id="surface-banner">
              <strong id="selected-date-label">날짜 선택</strong>
              <span id="selected-date-summary">선택한 거래일의 핵심 시그널을 불러오는 중입니다.</span>
            </div>

            <div class="table-wrap">
              <table class="data-table">
                <caption class="sr-only">상위 종목 요약 표</caption>
                <thead>
                  <tr>
                    <th>종목</th>
                    <th>시그널</th>
                    <th>신뢰도</th>
                    <th>현재가</th>
                    <th>진입 제안</th>
                    <th>목표가</th>
                    <th>손절가</th>
                    <th>판단 근거</th>
                  </tr>
                </thead>
                <tbody id="ticker-table-body">
                  <tr>
                    <td colspan="8" class="empty-row">데이터를 불러오는 중입니다.</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="mobile-card-list" id="mobile-card-list"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="./assets/js/main.js"></script>
</body>
</html>
